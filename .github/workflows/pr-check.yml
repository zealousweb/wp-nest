name: 🔎 PR Check

on:
    pull_request:
        branches:
            - master
            - stage
        types: [opened, synchronize, reopened]

jobs:
    pr-info:
        name: 📋 PR Info
        runs-on: ubuntu-latest
        steps:
            - name: Log PR Info
              run: |
                  TITLE="${{ github.event.pull_request.title }}"
                  echo "PR Title: $TITLE"
                  echo "✅ Basic PR checks passed"
