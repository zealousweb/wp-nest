name: 🔍 Code Standards & Build Check

on:
  push:
    branches:
      - master
      - stage
  pull_request:
    branches:
      - master
      - stage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 🏗️ Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Node Dependencies
        run: npm install

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run JS & SCSS Lint
        run: npm run lint

      - name: Run PHP CodeSniffer
        run: npm run phpcs

      - name: Verify Vite Build
        run: npm run build
