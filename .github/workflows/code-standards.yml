name: 🔍 Code Standards

on:
  push:
    branches:
      - master
      - stage
      - enhancement
      - feature/**
      - husky-demo
  pull_request:
    branches:
      - master
      - stage

# Cancel in-progress runs on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JavaScript Lint ──────────────────────────────────────────────────────
  lint-js:
    name: 🟨 ESLint (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint:js

  # ─── SCSS Lint ────────────────────────────────────────────────────────────
  lint-scss:
    name: 🟦 Stylelint (SCSS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Stylelint
        run: npm run lint:scss

  # ─── PHP Lint ─────────────────────────────────────────────────────────────
  lint-php:
    name: 🟪 PHPCS (PSR-12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CodeSniffer
        run: vendor/bin/phpcs

  # ─── JavaScript Tests ─────────────────────────────────────────────────────
  test-js:
    name: 🧪 Jest (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run JS Tests
        run: npm run test:js

  # ─── PHP Tests ────────────────────────────────────────────────────────────
  test-php:
    name: 🧪 PHPUnit (PHP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit
        run: npm run test:php

  # ─── Webpack Build ────────────────────────────────────────────────────────
  build:
    name: 🏗️ Webpack Production Build
    runs-on: ubuntu-latest
    needs: [lint-js, lint-scss, lint-php, test-js, test-php]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build production assets
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-assets
          path: assets/
          retention-days: 7
